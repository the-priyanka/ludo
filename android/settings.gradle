pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
    includeBuild("../node_modules/@react-native/gradle-plugin")
}
plugins {
    id("com.facebook.react.settings")
    id("org.gradle.toolchains.foojay-resolver-convention") version "0.8.0"
}

println "PATH: " + System.getenv("PATH")

extensions.configure(com.facebook.react.ReactSettingsExtension){ ex -> ex.autolinkLibrariesFromCommand() }
rootProject.name = 'ludo_game'
include ':app'

include ':react-native-nitro-modules'
project(':react-native-nitro-modules').projectDir = file('../node_modules/react-native-nitro-modules/android')
include ':react-native-worklets'
project(':react-native-worklets').projectDir = file('../node_modules/react-native-worklets/android')
